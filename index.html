<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restoran Menyu</title>

    <!-- Font: Roboto (talab bo'yicha) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="hero" aria-label="Qala Restaurant Banner">
        <div class="hero__controls">
          <label class="field" aria-label="Til tanlash">
            <select id="langSelect" class="field__select field__select--compact field__select--hero">
              <option value="uz">UZ</option>
              <option value="ru">RU</option>
              <option value="en">EN</option>
            </select>
          </label>

          <button id="themeToggle" class="iconBtn iconBtn--hero" type="button" aria-label="Theme toggle">
            <span class="iconBtn__icon" data-theme-icon></span>
          </button>
        </div>
      </div>

      <div class="sheet">
        <div class="container phone">
          <div class="top__bar">
            <div class="top__brand">
              <div class="top__titles">
                <div class="top__name" data-i18n="restaurantName">Qala Restaurant</div>
                <div class="top__meta" data-i18n="restaurantMeta">8 Eruv Qiz, Chilonzor, Tashkent</div>
              </div>
            </div>
          </div>

          <div class="top__statusRow">
            <span class="status" data-i18n="statusOpen">Блюды</span>
          </div>

          <div class="searchPill">
            <input
              id="searchInput"
              class="searchPill__input"
              type="search"
              placeholder="Поиск"
              aria-label="Qidiruv"
            />
            <span class="searchPill__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  d="M10.5 3a7.5 7.5 0 1 1 0 15A7.5 7.5 0 0 1 10.5 3Zm0 2a5.5 5.5 0 1 0 0 11a5.5 5.5 0 0 0 0-11Zm8.85 13.44l2.86 2.86a1 1 0 1 1-1.42 1.42l-2.86-2.86a1 1 0 0 1 1.42-1.42Z"
                />
              </svg>
            </span>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container phone">
        <section id="menuRoot" class="cats" aria-label="Menyu bo'limlari">
          <!-- JS render qiladi -->
        </section>
      </div>
    </main>

    <!-- Footer: aloqa + ijtimoiy tarmoqlar -->
    <footer class="footer">
      <div class="container phone footer__content">
        <div class="footer__col">
          <div class="footer__title" data-i18n="contact">Aloqa</div>
          <div class="footer__text">+998 90 000 00 00</div>
          <div class="footer__text">info@restaurant.uz</div>
          <div class="footer__text" data-i18n="address">Toshkent, O'zbekiston</div>
        </div>

        <div class="footer__col footer__col--right">
          <div class="footer__title" data-i18n="follow">Kuzatib boring</div>
          <div class="socials" aria-label="Ijtimoiy tarmoqlar">
            <a class="social" href="#" aria-label="Instagram">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm10 2H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3Zm-5 4.2a3.8 3.8 0 1 1 0 7.6a3.8 3.8 0 0 1 0-7.6Zm0 2a1.8 1.8 0 1 0 0 3.6a1.8 1.8 0 0 0 0-3.6ZM17.8 6.6a1 1 0 1 1-2 0a1 1 0 0 1 2 0Z"
                />
              </svg>
            </a>
            <a class="social" href="#" aria-label="Telegram">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  d="M21.6 4.4a1.5 1.5 0 0 0-1.6-.2L3.2 10.8a1.5 1.5 0 0 0 .2 2.8l4.4 1.4l1.7 5.2a1.5 1.5 0 0 0 2.4.7l2.8-2.3l4.6 3.3a1.5 1.5 0 0 0 2.4-.9l2.1-14.8a1.5 1.5 0 0 0-.7-1.8ZM9.2 14.1l9.8-6.2l-7.5 7.2l-.3 3.3l-1.6-4.9a1 1 0 0 0-.7-.6l-3.4-1.1l13.7-5.5l-10.6 6.7a1 1 0 0 0-.4 1.1Z"
                />
              </svg>
            </a>
            <a class="social" href="#" aria-label="Facebook">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  d="M13.5 22v-8h2.7l.5-3h-3.2V9.1c0-.9.3-1.5 1.6-1.5h1.7V4.9a23 23 0 0 0-2.6-.1c-2.6 0-4.3 1.6-4.3 4.5V11H7.4v3h2.5v8h3.6Z"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>

      <div class="footer__bottom">
        <div class="container phone footer__bottomInner">
          <span>© <span id="year"></span> <span data-i18n="appName">Restoran Menyu</span></span>
          <span class="footer__muted" data-i18n="made">Tez va qulay buyurtma</span>
        </div>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
